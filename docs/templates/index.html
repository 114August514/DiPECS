<!DOCTYPE html>
<html lang="zh-CN" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DiPECS Knowledge Base</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  <script>
    (function() {
      const stored = localStorage.getItem('theme');
      if (stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <style>
    .theme-toggle {
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    .theme-toggle:active {
      transform: scale(0.9);
    }
    .card-link {
      transition: all 0.2s ease;
    }
    /* mdBook 内嵌 iframe 自适应 */
    iframe {
      border: none;
      width: 100%;
    }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 flex items-center justify-center min-h-screen p-6 transition-colors">
  <div class="bg-white dark:bg-slate-800 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 p-8 w-full max-w-lg transition-colors">

    <!-- Header -->
    <div class="flex items-center justify-between border-b border-slate-200 dark:border-slate-700 pb-5 mb-6">
      <div class="flex items-center space-x-3">
        <i class="fa-solid fa-microchip text-3xl text-indigo-600 dark:text-indigo-400"></i>
        <h1 class="text-2xl font-bold text-slate-800 dark:text-slate-100 tracking-tight">DiPECS 文档中心</h1>
      </div>
      <button onclick="toggleTheme()" class="theme-toggle p-2 rounded-lg text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors" title="切换深色/浅色模式" aria-label="切换主题">
        <i id="theme-icon-dark" class="fa-solid fa-moon text-lg hidden"></i>
        <i id="theme-icon-light" class="fa-solid fa-sun text-lg hidden"></i>
        <i id="theme-icon-auto" class="fa-solid fa-circle-half-stroke text-lg"></i>
      </button>
    </div>

    <!-- Main Nav Cards -->
    <div class="space-y-4">
      <a href="./guide/" class="card-link group flex items-center justify-between p-4 rounded-lg border border-slate-200 dark:border-slate-700 hover:border-indigo-500 dark:hover:border-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-900/20 hover:shadow-sm text-slate-700 dark:text-slate-300 hover:text-indigo-700 dark:hover:text-indigo-400 font-medium">
        <div class="flex items-center space-x-4">
          <i class="fa-solid fa-book text-indigo-500 dark:text-indigo-400 text-lg w-6 text-center"></i>
          <span>核心架构指南 (最新版)</span>
        </div>
        <i class="fa-solid fa-chevron-right text-slate-400 dark:text-slate-500 group-hover:text-indigo-500 dark:group-hover:text-indigo-400 transition-colors"></i>
      </a>

      <a href="./{{API_PATH}}" class="card-link group flex items-center justify-between p-4 rounded-lg border border-slate-200 dark:border-slate-700 hover:border-orange-500 dark:hover:border-orange-400 hover:bg-orange-50 dark:hover:bg-orange-900/20 hover:shadow-sm text-slate-700 dark:text-slate-300 hover:text-orange-700 dark:hover:text-orange-400 font-medium">
        <div class="flex items-center space-x-4">
          <i class="fa-brands fa-rust text-orange-600 dark:text-orange-400 text-lg w-6 text-center"></i>
          <span>Rust API 参考手册 (最新版)</span>
        </div>
        <i class="fa-solid fa-chevron-right text-slate-400 dark:text-slate-500 group-hover:text-orange-500 dark:group-hover:text-orange-400 transition-colors"></i>
      </a>

      <!-- ACADEMIC_REPORTS_PLACEHOLDER -->
    </div>

    <!-- Archive Section -->
    <div class="mt-10 pt-6 border-t border-slate-200 dark:border-slate-700">
      <h3 class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-4 flex items-center">
        <i class="fa-solid fa-clock-rotate-left mr-2"></i>历史版本归档 (Archive)
      </h3>
      <div class="space-y-3">
        <!-- ARCHIVE_LIST_PLACEHOLDER -->
      </div>
    </div>

    <!-- Build Info -->
    <div class="mt-6 text-center">
      <!-- BUILD_TIMESTAMP_PLACEHOLDER -->
    </div>
  </div>

  <script>
    function updateThemeIcon() {
      const isDark = document.documentElement.classList.contains('dark');
      document.getElementById('theme-icon-dark').classList.toggle('hidden', !isDark);
      document.getElementById('theme-icon-light').classList.toggle('hidden', isDark);
      document.getElementById('theme-icon-auto').classList.add('hidden');
    }

    function toggleTheme() {
      const html = document.documentElement;
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        localStorage.setItem('theme', 'light');
      } else {
        html.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      }
      updateThemeIcon();
    }

    updateThemeIcon();
  </script>
</body>
</html>
